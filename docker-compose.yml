services:
  qwen3-tts-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qwen3-tts-web
    ports:
      - "${GRADIO_SERVER_PORT:-7860}:${GRADIO_SERVER_PORT:-7860}"
    env_file:
      - .env
    environment:
      HF_HOME: /data/hf-cache
      HF_HUB_CACHE: /data/hf-cache/hub
      OUTPUT_DIR: ${OUTPUT_DIR:-/data/outputs}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-0}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - hf-cache:/data/hf-cache
      - ./outputs:${OUTPUT_DIR:-/data/outputs}
      - ./certs:/data/certs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  hf-cache:
